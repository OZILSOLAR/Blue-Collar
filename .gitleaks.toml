title = "Blue-Collar Gitleaks config"

# Test files: hardcoded passwords/secrets are intentional for test isolation
[[allowlist]]
description = "Test fixtures with intentional placeholder secrets"
regexes = [
  # Test JWT secrets
  (?i)test.secret,
  (?i)test.jwt.secret.key.for.testing,
  # Test passwords
  (?i)test123!@#,
  # E2E test credentials
  (?i)e2e\+[0-9]+@example\.com,
]

[[allowlist]]
description = "Password123! used exclusively in e2e and integration tests"
paths = [
  "packages/api/src/__tests__/",
  "packages/api/src/controllers/*.test.ts",
  "packages/api/src/services/*.test.ts",
  "packages/api/src/middleware/*.test.ts",
  "packages/api/src/utils/*.test.ts",
  "packages/api/src/config/*.test.ts",
  "packages/app/e2e/",
  "deploy/load-tests/",
]

[[allowlist]]
description = "Example env files with placeholder credentials"
paths = [
  ".env.example",
  "packages/api/.env.example",
  "packages/api/.env.staging.example",
  "deploy/monitoring/.env.example",
  "packages/monitoring/.env.example",
]

[[allowlist]]
description = "Kubernetes secrets template"
paths = [
  "deploy/k8s/secrets.yaml",
]

[[allowlist]]
description = "Docker compose dev default password"
paths = [
  "docker-compose.yml",
]
