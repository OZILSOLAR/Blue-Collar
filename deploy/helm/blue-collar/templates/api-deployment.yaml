{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blue-collar.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "blue-collar.name" . }}-api
    helm.sh/chart: {{ include "blue-collar.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "blue-collar.name" . }}-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "blue-collar.name" . }}-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: api
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api.containerPort }}
          name: http
        env:
        {{- toYaml .Values.api.env | nindent 8 }}
        - name: DB_HOST
          value: "{{ .Release.Name }}-postgresql"
        - name: DB_USER
          value: {{ .Values.postgresql.auth.username }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "blue-collar.fullname" . }}-postgresql
              key: password
        - name: DB_NAME
          value: {{ .Values.postgresql.auth.database }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.api.probes.liveness.path }}
            port: http
          initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.api.probes.readiness.path }}
            port: http
          initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
