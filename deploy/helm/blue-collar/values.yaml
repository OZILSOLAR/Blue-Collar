# Default values for blue-collar

# Global settings
global:
  environment: production
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "standard"

# API Service
api:
  enabled: true
  replicas: 2
  image:
    repository: blue-collar-api
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 5
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3000"

# App Service (Frontend)
app:
  enabled: true
  replicas: 2
  image:
    repository: blue-collar-app
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 5
  env:
    - name: NEXT_PUBLIC_API_URL
      value: "http://api:3000"

# Indexer Service
indexer:
  enabled: true
  replicas: 1
  image:
    repository: blue-collar-indexer
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  hpa:
    enabled: false
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 5
  env:
    - name: NODE_ENV
      value: "production"

# Database
postgresql:
  enabled: true
  auth:
    username: "blue_collar"
    password: "changeme"
    database: "blue_collar"
  primary:
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1"
    persistence:
      enabled: true
      size: "10Gi"

# Redis
redis:
  enabled: true
  auth:
    enabled: true
    password: "changeme"
  master:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    persistence:
      enabled: true
      size: "5Gi"

# Ingress
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: blue-collar.example.com
      paths:
        - path: /
          pathType: Prefix
          service: app
          port: 80
        - path: /api
          pathType: Prefix
          service: api
          port: 3000
  tls:
    - hosts:
        - blue-collar.example.com
      secretName: blue-collar-tls

# Service Account
serviceAccount:
  create: true
  name: "blue-collar"
  annotations: {}

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
