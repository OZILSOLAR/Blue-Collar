global:
  environment: development

api:
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: false

app:
  replicas: 1
  hpa:
    enabled: false

indexer:
  replicas: 1

postgresql:
  primary:
    persistence:
      enabled: false
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

ingress:
  enabled: false
