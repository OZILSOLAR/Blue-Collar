global:
  environment: staging

api:
  replicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6

app:
  replicas: 2

indexer:
  replicas: 1

postgresql:
  primary:
    persistence:
      enabled: true
      size: "10Gi"
