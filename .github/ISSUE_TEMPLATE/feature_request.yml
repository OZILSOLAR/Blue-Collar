name: Feature Request
description: Suggest an idea for BlueCollar
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve and the solution you have in mind.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of BlueCollar does this feature relate to?
      options:
        - API (packages/api)
        - App / Frontend (packages/app)
        - Smart Contracts (packages/contracts)
        - Deployment / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe what you're trying to accomplish.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered? Why did you choose this approach?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references that help explain the feature.
