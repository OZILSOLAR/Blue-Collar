name: Bug Report
description: Report a bug to help us improve BlueCollar
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible so we can reproduce and fix the issue.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of BlueCollar is affected?
      options:
        - API (packages/api)
        - App / Frontend (packages/app)
        - Smart Contracts (packages/contracts)
        - Deployment / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I try to..., the application...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots, error logs, or console output to help explain your problem.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please complete the following information.
      value: |
        - OS: [e.g. macOS 14, Ubuntu 22.04, Windows 11]
        - Browser (if frontend): [e.g. Chrome 120, Firefox 121]
        - Node.js version: [e.g. 20.11]
        - pnpm version: [e.g. 9.0]
        - Stellar network: [testnet / mainnet]
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. related issues, possible cause).
