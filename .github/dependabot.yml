# Dependabot configuration — automated dependency updates with grouped PRs.
# Closes #800
version: 2

updates:
  # ---------------------------------------------------------------------------
  # Root workspace (pnpm)
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript*"
          - "@types/*"
          - "vitest*"
          - "vite*"
    ignore:
      # Avoid major-version bumps until manually reviewed
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - devops

  # ---------------------------------------------------------------------------
  # API package (pnpm)
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /packages/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      api-security:
        patterns:
          - "argon2*"
          - "jsonwebtoken*"
          - "passport*"
          - "helmet*"
          - "express-rate-limit*"
      api-runtime:
        patterns:
          - "express*"
          - "prisma*"
          - "@prisma/*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - devops

  # ---------------------------------------------------------------------------
  # App package (pnpm)
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /packages/app
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      nextjs-ecosystem:
        patterns:
          - "next*"
          - "react*"
          - "@next/*"
      stellar-sdk:
        patterns:
          - "@stellar/*"
          - "stellar*"
      ui-components:
        patterns:
          - "@radix-ui/*"
          - "tailwindcss*"
          - "class-variance-authority*"
          - "lucide-react*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - devops

  # ---------------------------------------------------------------------------
  # Rust / Cargo (smart contracts)
  # ---------------------------------------------------------------------------
  - package-ecosystem: cargo
    directory: /packages/contracts
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      soroban-sdk:
        patterns:
          - "soroban-sdk*"
          - "stellar-sdk*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - devops

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - devops
      - github-actions
