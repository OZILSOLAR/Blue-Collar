name: Secret Scan

# Block committed secrets from reaching the repo. Uses Gitleaks to scan every
# push and PR. CI fails (blocking gate) when a secret pattern is detected.
# Closes #798
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    name: Detect secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Gitleaks can diff commits on push events
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Treat any detected secret as a hard failure
          GITLEAKS_ENABLE_COMMENTS: true

  trufflehog:
    name: Detect secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS scan
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          # On PRs scan only the delta; on push scan full history
          extra_args: >
            --only-verified
            --fail
