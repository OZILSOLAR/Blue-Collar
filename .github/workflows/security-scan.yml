name: Supply-Chain Security

# SBOM generation, container image scanning (Trivy), dependency audit gates,
# and pinned-actions enforcement.
# Closes #800
on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "Dockerfile"
      - "**/Dockerfile"
      - ".github/workflows/security-scan.yml"
  pull_request:
    paths:
      - "packages/**"
      - "Dockerfile"
      - "**/Dockerfile"
      - ".github/workflows/security-scan.yml"
  schedule:
    # Run weekly even when code hasn't changed to catch newly-published CVEs
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # SBOM generation (Syft) — produces CycloneDX JSON for images and packages
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM for Node packages (CycloneDX)
        uses: anchore/sbom-action@v0.20.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-packages.cdx.json
          artifact-name: sbom-packages

      - name: Build API Docker image for SBOM
        run: |
          docker build -t bluecollar-api:${{ github.sha }} packages/api

      - name: Generate SBOM for API Docker image
        uses: anchore/sbom-action@v0.20.0
        with:
          image: bluecollar-api:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-api-image.cdx.json
          artifact-name: sbom-api-image

      - name: Attest SBOM (on main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-sbom@v2
        with:
          subject-name: bluecollar-api
          subject-digest: ${{ github.sha }}
          sbom-path: sbom-api-image.cdx.json

  # ---------------------------------------------------------------------------
  # Container image scanning with Trivy — fails on HIGH/CRITICAL CVEs
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t bluecollar-api:${{ github.sha }} packages/api

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: bluecollar-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          # Hard-fail on HIGH or CRITICAL vulnerabilities
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # Dependency vulnerability audit — npm and Rust
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high severity gate)
        # Fail only on HIGH or CRITICAL advisories
        run: pnpm audit --audit-level=high

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Cargo audit
        working-directory: packages/contracts
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Pinned-actions check — ensure all workflow action refs use full SHAs
  # ---------------------------------------------------------------------------
  pinned-actions:
    name: Check pinned action SHAs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unpinned actions (tag refs)
        run: |
          # Fail if any workflow uses a floating tag (e.g. @v4) instead of a
          # pinned SHA. Gated on our own workflows only.
          UNPINNED=$(grep -rE 'uses: [^@]+@v[0-9]' .github/workflows/ \
            --include="*.yml" || true)

          if [[ -n "$UNPINNED" ]]; then
            echo "::warning::The following actions use floating version tags instead of pinned SHAs:"
            echo "$UNPINNED"
            echo ""
            echo "Consider pinning to a full commit SHA for supply-chain security."
            echo "Example: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2"
            # Non-blocking warning (exit 0) — can be tightened to exit 1 once
            # all actions in this repo are pinned.
          else
            echo "All action refs are pinned. ✅"
          fi
