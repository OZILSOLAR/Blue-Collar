name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm -w -s build

      - name: Start server (background)
        run: |
          pnpm --filter "@bluecollar/app" start --port 3001 &
          sleep 3

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BROWSERS: ${{ matrix.browser }}
        run: pnpm --filter "@bluecollar/app" test:e2e --project=${{ matrix.browser }} --reporter=list

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/app/playwright-report

      - name: Upload screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            packages/app/test-results
            packages/app/playwright-report
            packages/app/**/videos
            packages/app/**/screenshots
