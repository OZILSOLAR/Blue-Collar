name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - "packages/app/src/**"
      - "packages/app/e2e/**"
      - "packages/app/playwright.config.ts"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    paths:
      - "packages/app/src/**"
      - "packages/app/e2e/**"
      - "packages/app/playwright.config.ts"
      - ".github/workflows/e2e-tests.yml"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter "@bluecollar/app" exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build app
        run: pnpm --filter "@bluecollar/app" build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Start server (background)
        run: |
          pnpm --filter "@bluecollar/app" start --port 3001 &
          sleep 3

      - name: Run Playwright tests
        run: pnpm --filter "@bluecollar/app" test:e2e --project=${{ matrix.browser }}
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3001"

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: packages/app/test-results
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/app/playwright-report
          retention-days: 7
