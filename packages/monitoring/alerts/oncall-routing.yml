# On-Call Routing Configuration

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    # Critical alerts go to PagerDuty
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
      routes:
        - match:
            service: api
          receiver: 'pagerduty-backend'
        - match:
            service: indexer
          receiver: 'pagerduty-indexer'
        - match:
            service: queue
          receiver: 'pagerduty-backend'
        - match:
            service: contracts
          receiver: 'pagerduty-blockchain'

    # Warning alerts go to Slack
    - match:
        severity: warning
      receiver: 'slack-warnings'
      continue: true

    # Info alerts go to email
    - match:
        severity: info
      receiver: 'email-info'

# Receivers
receivers:
  - name: 'default'
    email_configs:
      - to: 'devops@blue-collar.io'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'your-pagerduty-service-key'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          description: '{{ .CommonAnnotations.description }}'
          runbook: '{{ .CommonAnnotations.runbook }}'

  - name: 'pagerduty-backend'
    pagerduty_configs:
      - service_key: 'your-pagerduty-backend-key'
        description: '{{ .CommonAnnotations.summary }}'

  - name: 'pagerduty-indexer'
    pagerduty_configs:
      - service_key: 'your-pagerduty-indexer-key'
        description: '{{ .CommonAnnotations.summary }}'

  - name: 'pagerduty-blockchain'
    pagerduty_configs:
      - service_key: 'your-pagerduty-blockchain-key'
        description: '{{ .CommonAnnotations.summary }}'

  - name: 'slack-warnings'
    slack_configs:
      - channel: '#alerts-warnings'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: 'email-info'
    email_configs:
      - to: 'team@blue-collar.io'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
