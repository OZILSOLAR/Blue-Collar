[workspace]
members = [
    "contracts/types",
    "contracts/registry",
    "contracts/market",
    "contracts/dispute",
    "contracts/fee_distribution",
    "contracts/insurance_pool",
    "contracts/fuzz",
    "contracts/integration",
]
resolver = "2"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
panic = "abort"
codegen-units = 1
